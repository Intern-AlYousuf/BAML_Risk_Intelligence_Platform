# ══════════════════════════════════════════════════════════════════════════════
#  BAML Risk Intelligence Platform — Docker Compose
#
#  Base configuration — production-compatible.
#  For local development add hot-reload and source mounts by running:
#
#      docker compose up          ← applies docker-compose.override.yml too
#      docker compose -f docker-compose.yml up   ← base only (production-like)
#
#  Quick start:
#      cp .env.docker .env.local
#      docker compose up --build
# ══════════════════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-baml_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baml_password}
      POSTGRES_DB:       ${POSTGRES_DB:-baml_risk_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXPOSE_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baml_user} -d ${POSTGRES_DB:-baml_risk_db}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
    networks:
      - baml_net

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     runtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV:           ${APP_ENV:-development}
      APP_VERSION:       ${APP_VERSION:-1.0.0}
      DEBUG:             ${DEBUG:-false}
      PORT:              ${BACKEND_PORT:-8000}

      # Database — use internal service name, not localhost
      POSTGRES_HOST:     db
      POSTGRES_PORT:     5432
      POSTGRES_USER:     ${POSTGRES_USER:-baml_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baml_password}
      POSTGRES_DB:       ${POSTGRES_DB:-baml_risk_db}

      SECRET_KEY:        ${SECRET_KEY:-change-this-in-production}
      ALLOWED_ORIGINS:   ${ALLOWED_ORIGINS:-http://localhost:3000}
      ALLOWED_HOSTS:     ${ALLOWED_HOSTS:-*}
      LOG_LEVEL:         ${LOG_LEVEL:-INFO}
      LOG_JSON:          ${LOG_JSON:-false}
      RUN_MIGRATIONS:    ${RUN_MIGRATIONS:-true}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - baml_net

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      target:     runner
      args:
        # Bake the internal backend URL into the Next.js rewrite rule at build time.
        # Browser calls /api/... → Next.js rewrites to http://backend:8000/api/...
        BACKEND_URL: http://backend:8000
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV:                  production
      BACKEND_URL:               http://backend:8000
      NEXT_PUBLIC_APP_ENV:       ${APP_ENV:-development}
      NEXT_PUBLIC_APP_VERSION:   ${APP_VERSION:-1.0.0}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - baml_net


# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local


# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  baml_net:
    driver: bridge
